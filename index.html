<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edlawit ❤️</title>
<style>
body{
    margin:0;
    background:#0b1b5a;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}
#heart{
    position:relative;
    width:500px;
    height:500px;
    animation:pulse 2s infinite;
}
.word{
    position:absolute;
    color:#ff8fa3;
    font-size:20px;
    font-weight:bold;
    transform:translate(-50%,-50%);
}
#name{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:48px;
    font-weight:bold;
}
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.04);}
}
</style>
</head>
<body>

<div id="heart">
  <div id="name">Edlawit</div>
</div>

<script>
const heart=document.getElementById("heart");

for(let t=0; t<Math.PI*2; t+=0.15){
    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    x*=14;   // medium size
    y*=14;

    let word=document.createElement("div");
    word.className="word";
    word.innerText="I love you";

    word.style.left=(250+x)+"px";
    word.style.top=(250+y)+"px";

    heart.appendChild(word);
}
</script>

</body>
</html>
